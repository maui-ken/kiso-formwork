<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1f6feb" />
  <title>基礎型枠 割付計算</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="基礎型枠" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="appbar">
    <h1>基礎型枠 割付計算</h1>
    <span class="ver">v2.0</span>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="project">図面・寸法</button>
    <button class="tab" data-tab="inventory">在庫</button>
    <button class="tab" data-tab="result">計算結果</button>
  </nav>

  <main>
    <!-- ===== 図面・寸法 ===== -->
    <section id="tab-project" class="panel active">
      <div class="card">
        <div class="row">
          <label>現場名</label>
          <input id="projName" type="text" placeholder="例: 〇〇様邸 基礎" />
        </div>
        <div class="row two">
          <div>
            <label>基礎幅(mm)</label>
            <input id="thickness" type="number" inputmode="numeric" value="150" />
            <small>内側の面は出隅で−幅・入隅で＋幅で計算</small>
          </div>
          <div>
            <label>両面で計算</label>
            <select id="bothFaces">
              <option value="1" selected>両面(内+外)</option>
              <option value="0">片面のみ</option>
            </select>
          </div>
        </div>
        <div class="row two">
          <div>
            <label>単管の段数</label>
            <input id="pipeRows" type="number" inputmode="numeric" value="1" min="0" />
            <small>型枠に水平に流す段数（0で計算しない）</small>
          </div>
          <div></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <h2>各辺の長さ と 角</h2>
          <span class="hint">図面を見ながら入力</span>
        </div>
        <p class="hint">時計回りに1辺ずつ入力。「出/入」ボタンでその辺の<b>次の角</b>が出隅か入隅かを切り替えます（L字・コの字対応）。</p>

        <div class="quick">
          <details>
            <summary>長方形を一括入力</summary>
            <div class="row two">
              <div><label>横 W(mm)</label><input id="rectW" type="number" inputmode="numeric" placeholder="9100" /></div>
              <div><label>縦 D(mm)</label><input id="rectD" type="number" inputmode="numeric" placeholder="7280" /></div>
            </div>
            <button class="btn" id="addRect">長方形(4辺)を追加</button>
          </details>
        </div>

        <div id="edgeList" class="edge-list"></div>

        <div class="row two">
          <input id="edgeLen" type="number" inputmode="numeric" placeholder="辺の長さ mm" />
          <button class="btn" id="addEdge">辺を追加</button>
        </div>

        <label class="check">
          <input type="checkbox" id="closed" checked />
          外周として閉じる（角の数＝辺の数）
        </label>
        <p class="totals" id="edgeTotals"></p>
        <div id="shapePreview" class="shape-preview" style="display:none"></div>
      </div>

      <button class="btn primary big" id="calcBtn">割付を計算する</button>
    </section>

    <!-- ===== 型枠在庫 ===== -->
    <section id="tab-inventory" class="panel">
      <div class="card">
        <div class="card-head">
          <h2>所有している型枠・単管を登録</h2>
        </div>
        <p class="hint">サイズと所有数を登録します。パネルは大きい順に使われ、在庫数で過不足を判定します。</p>

        <div class="seg wrap" id="typeSeg">
          <button class="seg-btn active" data-type="straight">ヒラパネル</button>
          <button class="seg-btn" data-type="corner">出隅コーナー</button>
          <button class="seg-btn" data-type="cornerIn">入隅コーナー</button>
          <button class="seg-btn" data-type="adjust">スライド</button>
          <button class="seg-btn" data-type="pipe">単管</button>
        </div>

        <div id="invForm" class="inv-form"></div>
        <button class="btn" id="addInv">在庫に追加</button>
      </div>

      <div class="card">
        <div class="card-head"><h2>登録済み在庫</h2></div>
        <div id="invList" class="inv-list"></div>
      </div>
    </section>

    <!-- ===== 計算結果 ===== -->
    <section id="tab-result" class="panel">
      <div id="resultArea"></div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
